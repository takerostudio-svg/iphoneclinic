<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhoneClinic – Management System</title>

<style>
:root {
    --primary: #007aff;
    --bg: #f2f2f7;
    --card: #ffffff;
    --text-main: #1c1c1e;
    --text-sub: #8e8e93;
    --border: #e5e5ea;
    --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

body.dark-mode {
    --bg: #000000;
    --card: #1c1c1e;
    --text-main: #ffffff;
    --text-sub: #8e8e93;
    --border: #38383a;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
}

body {
    font-family: -apple-system, system-ui, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    margin: 0;
    transition: background 0.3s, color 0.3s;
}

.app-container {
    max-width: 850px;
    margin: 40px auto;
    padding: 0 20px;
}

header {
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

/* EL DISTINTIVO PRO AZUL */
.badge { 
    background: var(--primary); 
    color: white; 
    padding: 4px 10px; 
    border-radius: 8px; 
    font-size: 12px; 
    vertical-align: middle; 
    margin-left: 5px;
}

.search-input {
    width: 100%;
    padding: 18px 25px;
    border-radius: 15px;
    border: 1px solid var(--border);
    background: var(--card);
    box-shadow: var(--shadow);
    font-size: 18px;
    color: var(--text-main);
    box-sizing: border-box;
    margin-bottom: 25px;
    outline: none;
}
.search-input:focus { border-color: var(--primary); }

.shortcuts-label { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
.shortcuts-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }

.shortcut-btn {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 12px;
    font-weight: 500;
    color: var(--text-main);
    cursor: pointer;
    transition: 0.2s;
}
.shortcut-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.custom-select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 25px;
    background: var(--card);
    color: var(--text-main);
}

.repair-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
.repair-card {
    background: var(--card);
    padding: 20px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: var(--shadow);
    color: var(--text-main);
}
.repair-card.active { border-color: var(--primary); background: rgba(0, 114, 243, 0.1); }

.result-card {
    background: var(--card);
    border-radius: 24px;
    padding: 35px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.price-tag { font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0; }

.copy-box {
    margin-top: 25px;
    background: rgba(0,0,0,0.03);
    padding: 15px;
    border-radius: 12px;
    font-size: 14px;
    white-space: pre-line;
    border: 1px dashed var(--text-sub);
    color: var(--text-sub);
    text-align: left;
}

.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
.btn { padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: var(--border); color: var(--text-main); }
.btn-danger { background: #ff3b30; color: white; }

.admin-section { background: var(--card); margin-top: 40px; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); }
.admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.admin-table td { padding: 12px; border-bottom: 1px solid var(--border); }
.admin-table input { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); padding: 5px; border-radius: 5px; width: 80px; }

.hidden { display: none; }
.footer { text-align: center; margin-top: 50px; padding-bottom: 40px; color: var(--text-sub); font-size: 13px; }
</style>
</head>
<body id="mainBody">

<div class="app-container">
    <header>
        <div>
            <h1>iPhoneClinic <span class="badge">PRO</span></h1>
            <div style="color: var(--text-sub); font-size: 12px;">Cotizador Central v6</div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="btn-secondary" onclick="toggleDarkMode()" style="padding: 8px 12px;">🌓 Modo</button>
            <button class="btn-secondary" id="adminAccessBtn" onclick="loginAdmin()" style="padding: 8px 12px;">Admin</button>
        </div>
    </header>

    <input type="text" class="search-input" id="mainSearch" placeholder="Ej: 13 pantalla o 15 bateria...">

    <div class="shortcuts-label">Shortcuts Inteligent</div>
    <div class="shortcuts-grid" id="shortcuts"></div>

    <select class="custom-select" id="modelSelect"></select>

    <div class="repair-options">
        <div class="repair-card" id="btn-pantalla" onclick="handleRepairClick('pantalla')">
            <div style="font-size: 24px;">📱</div>
            <strong>Pantalla</strong>
        </div>
        <div class="repair-card" id="btn-bateria" onclick="handleRepairClick('bateria')">
            <div style="font-size: 24px;">🔋</div>
            <strong>Batería</strong>
        </div>
    </div>

    <div id="displayArea"></div>

    <div id="adminPanel" class="admin-section hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0">Panel Administrativo</h2>
            <button class="btn-danger" style="padding: 8px 15px;" onclick="logoutAdmin()">Cerrar Sesión</button>
        </div>
        <div style="margin: 20px 0; display:flex; gap:10px;">
            <button class="btn-primary" onclick="addNewModel()">+ Agregar</button>
            <button class="btn-secondary" onclick="persistData()">Guardar Cambios</button>
        </div>
        <table class="admin-table"><tbody id="adminBody"></tbody></table>
    </div>

    <div class="footer">
        iPhoneClinic &copy; <span id="currentYear"></span> | Sistema de Gestión Interna
    </div>
</div>

<script>
let data = {
    "iphone 7":{pantalla:35000,bateria:25000},"iphone 7 plus":{pantalla:38000,bateria:25000},
    "iphone 8":{pantalla:38000,bateria:25000},"iphone 8 plus":{pantalla:42000,bateria:27000},
    "iphone x":{pantalla:55000,bateria:30000},"iphone xs":{pantalla:60000,bateria:32000},
    "iphone xs max":{pantalla:65000,bateria:35000},"iphone xr":{pantalla:60000,bateria:32000},
    "iphone 11":{pantalla:70000,bateria:40000},"iphone 11 pro":{pantalla:90000,bateria:42000},
    "iphone 11 pro max":{pantalla:95000,bateria:42000},"iphone 12":{pantalla:95000,bateria:45000},
    "iphone 12 mini":{pantalla:95000,bateria:45000},"iphone 12 pro":{pantalla:110000,bateria:45000},
    "iphone 12 pro max":{pantalla:120000,bateria:48000},"iphone 13":{pantalla:85000,bateria:45000},
    "iphone 13 mini":{pantalla:85000,bateria:45000},"iphone 13 pro":{pantalla:120000,bateria:50000},
    "iphone 13 pro max":{pantalla:130000,bateria:50000},"iphone 14":{pantalla:110000,bateria:50000},
    "iphone 14 plus":{pantalla:120000,bateria:52000},"iphone 14 pro":{pantalla:150000,bateria:55000},
    "iphone 14 pro max":{pantalla:160000,bateria:55000},"iphone 15":{pantalla:140000,bateria:55000},
    "iphone 15 plus":{pantalla:150000,bateria:58000},"iphone 15 pro":{pantalla:180000,bateria:60000},
    "iphone 15 pro max":{pantalla:190000,bateria:60000}
};

let activeModel = null;
let activeRepair = null;
const garantia = "Garantía por servicio y falla de fábrica.";

const saved = localStorage.getItem("clinic_pro_data");
if(saved) data = JSON.parse(saved);

// SHORTCUTS CON NOMBRE "iPhone X"
function initShortcuts() {
    const container = document.getElementById("shortcuts");
    container.innerHTML = "";
    const list = ["iphone 11", "iphone 12", "iphone 13", "iphone 14", "iphone 15"];
    list.forEach(m => {
        const btn = document.createElement("button");
        btn.className = "shortcut-btn";
        btn.textContent = m.toUpperCase(); // Ahora dice IPHONE 11, etc.
        btn.onclick = () => selectModel(m, btn);
        container.appendChild(btn);
    });
}

function initSelect() {
    const sel = document.getElementById("modelSelect");
    sel.innerHTML = '<option value="">Todos los modelos...</option>';
    Object.keys(data).sort().forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m.toUpperCase();
        sel.appendChild(opt);
    });
}

function selectModel(m, btn) {
    activeModel = m;
    document.querySelectorAll(".shortcut-btn").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
    document.getElementById("modelSelect").value = m;
    render();
}

function handleRepairClick(type) {
    if(activeRepair === type) {
        activeRepair = null;
        document.getElementById(`btn-${type}`).classList.remove("active");
    } else {
        activeRepair = type;
        document.querySelectorAll(".repair-card").forEach(c => c.classList.remove("active"));
        document.getElementById(`btn-${type}`).classList.add("active");
    }
    render();
}

function render() {
    const area = document.getElementById("displayArea");
    if(!activeModel || !activeRepair) { area.innerHTML = ""; return; }

    const price = data[activeModel][activeRepair];
    const title = activeRepair === "pantalla" ? "Cambio de Pantalla" : "Cambio de Batería";
    const extra = activeRepair === "bateria" ? "Batería marca Mechanic – Condición 100%" : "Repuesto Calidad Original";

    const fullMsg = `${activeModel.toUpperCase()}\n\n${title}\nPrecio: ${formatMoney(price)}\n${extra}\nTiempo: 30-45 min\n${garantia}`;

    area.innerHTML = `
        <div class="result-card">
            <div style="font-weight:700; font-size:18px;">${activeModel.toUpperCase()}</div>
            <div style="color:var(--text-sub)">${title}</div>
            <div class="price-tag">${formatMoney(price)}</div>
            <div class="copy-box" id="copyMsg">${fullMsg}</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="copyToClipboard()">Copiar Respuesta</button>
                <button class="btn btn-secondary" onclick="openWA()">WhatsApp</button>
            </div>
        </div>
    `;
}

function formatMoney(n) { return "$" + Number(n).toLocaleString('es-CL'); }

function copyToClipboard() {
    const price = formatMoney(data[activeModel][activeRepair]);
    const title = activeRepair === "pantalla" ? "Cambio de Pantalla" : "Cambio de Batería";
    const extra = activeRepair === "bateria" ? "Batería marca Mechanic – Condición 100%" : "Repuesto Calidad Original";

    const text = activeModel.toUpperCase() + "\n\n" + title + "\n" + "Precio: " + price + "\n" + extra + "\n" + "Tiempo de reparación: 30 a 45 minutos\n" + garantia;

    navigator.clipboard.writeText(text).then(() => alert("Copiado satisfactoriamente"));
}

function openWA() {
    const text = document.getElementById("copyMsg").innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function toggleDarkMode() { document.getElementById("mainBody").classList.toggle("dark-mode"); }

function loginAdmin() {
    if(prompt("Password:") === "admin123") {
        document.getElementById("adminPanel").classList.remove("hidden");
        renderAdmin();
    }
}

function logoutAdmin() { document.getElementById("adminPanel").classList.add("hidden"); }

function renderAdmin() {
    const body = document.getElementById("adminBody");
    body.innerHTML = "";
    Object.keys(data).sort().forEach(m => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td><strong>${m.toUpperCase()}</strong></td>
            <td><input type="number" value="${data[m].pantalla}" onchange="data['${m}'].pantalla=Number(this.value)"></td>
            <td><input type="number" value="${data[m].bateria}" onchange="data['${m}'].bateria=Number(this.value)"></td>`;
        body.appendChild(tr);
    });
}

function persistData() { localStorage.setItem("clinic_pro_data", JSON.stringify(data)); alert("Guardado."); }

// BUSCADOR MEJORADO E INMEDIATO
document.getElementById("mainSearch").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase().trim();
    if(val === "") return;

    // Buscar modelo
    Object.keys(data).forEach(m => {
        const simpleModel = m.replace("iphone ", "");
        // Si el usuario escribe "13" y el modelo es "iphone 13"
        if(val.includes(simpleModel) && simpleModel.length > 1) {
            activeModel = m;
            document.getElementById("modelSelect").value = m;
        }
    });

    // Buscar falla
    if(val.includes("pan") || val.includes("screen")) {
        activeRepair = "pantalla";
        document.querySelectorAll(".repair-card").forEach(c => c.classList.remove("active"));
        document.getElementById("btn-pantalla").classList.add("active");
    } 
    else if(val.includes("bat")) {
        activeRepair = "bateria";
        document.querySelectorAll(".repair-card").forEach(c => c.classList.remove("active"));
        document.getElementById("btn-bateria").classList.add("active");
    }

    render();
});

document.getElementById("modelSelect").onchange = (e) => selectModel(e.target.value);
document.getElementById("currentYear").textContent = new Date().getFullYear();

initShortcuts();
initSelect();
</script>
</body>
</html>
