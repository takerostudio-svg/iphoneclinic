<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhoneClinic – Management System</title>

<style>
:root {
    --primary: #007aff;
    --bg: #f2f2f7;
    --card: #ffffff;
    --text-main: #1c1c1e;
    --text-sub: #8e8e93;
    --border: #e5e5ea;
    --shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* MODO OSCURO */
body.dark-mode {
    --bg: #000000;
    --card: #1c1c1e;
    --text-main: #ffffff;
    --text-sub: #8e8e93;
    --border: #38383a;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
}

body {
    font-family: -apple-system, system-ui, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    margin: 0;
    transition: background 0.3s;
}

.app-container {
    max-width: 850px;
    margin: 40px auto;
    padding: 0 20px;
}

header {
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

/* BUSCADOR */
.search-input {
    width: 100%;
    padding: 18px 25px;
    border-radius: 15px;
    border: 1px solid var(--border);
    background: var(--card);
    box-shadow: var(--shadow);
    font-size: 18px;
    color: var(--text-main);
    box-sizing: border-box;
    margin-bottom: 25px;
}

.shortcuts-label { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
.shortcuts-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }

.shortcut-btn {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 12px;
    font-weight: 500;
    color: var(--text-main);
    cursor: pointer;
}
.shortcut-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

.custom-select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 25px;
    background: var(--card);
    color: var(--text-main);
}

.repair-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
.repair-card {
    background: var(--card);
    padding: 20px;
    border-radius: 18px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: var(--shadow);
    color: var(--text-main);
}
.repair-card.active { border-color: var(--primary); background: rgba(0, 114, 243, 0.1); }

.result-card {
    background: var(--card);
    border-radius: 24px;
    padding: 35px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

.price-tag { font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0; }

.copy-box {
    margin-top: 25px;
    background: rgba(0,0,0,0.03);
    padding: 15px;
    border-radius: 12px;
    font-size: 14px;
    white-space: pre-line;
    border: 1px dashed var(--text-sub);
    color: var(--text-sub);
}

/* BOTONES */
.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
.btn { padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: var(--border); color: var(--text-main); }
.btn-danger { background: #ff3b30; color: white; }

.hidden { display: none; }
.footer { text-align: center; margin-top: 50px; padding-bottom: 40px; color: var(--text-sub); font-size: 13px; }

/* ADMIN */
.admin-section { background: var(--card); margin-top: 40px; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); }
.admin-table { width: 100%; border-collapse: collapse; }
.admin-table td { padding: 15px 10px; border-bottom: 1px solid var(--border); }
.admin-table input { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); padding: 5px; border-radius: 5px; }

</style>
</head>
<body id="body">

<div class="app-container">
    <header>
        <div>
            <h1>iPhoneClinic</h1>
            <div style="color: var(--text-sub); font-size: 12px;">Cotizador PRO v6</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-secondary" onclick="toggleDarkMode()" style="padding: 8px 12px;">🌙 Modo</button>
            <button class="btn-secondary" id="adminAccessBtn" onclick="loginAdmin()" style="padding: 8px 12px;">Admin</button>
        </div>
    </header>

    <input type="text" class="search-input" id="mainSearch" placeholder="Busca un modelo o falla...">

    <div class="shortcuts-label">Accesos Directos (Base)</div>
    <div class="shortcuts-grid" id="shortcuts"></div>

    <select class="custom-select" id="modelSelect"></select>

    <div class="repair-options">
        <div class="repair-card" id="btn-pantalla" onclick="toggleRepair('pantalla')">📱 Pantalla</div>
        <div class="repair-card" id="btn-bateria" onclick="toggleRepair('bateria')">🔋 Batería</div>
    </div>

    <div id="displayArea"></div>

    <div id="adminPanel" class="admin-section hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>Panel Admin</h2>
            <button class="btn-danger" onclick="logoutAdmin()">Cerrar</button>
        </div>
        <button class="btn-primary" onclick="addNewModel()">+ Nuevo</button>
        <button class="btn-secondary" onclick="persistData()">Guardar</button>
        <table class="admin-table"><tbody id="adminBody"></tbody></table>
    </div>

    <div class="footer">
        iPhoneClinic &copy; <span id="currentYear"></span> | Sistema Interno
    </div>
</div>

<script>
let data = {
    "iphone 7":{pantalla:35000,bateria:25000},"iphone 7 plus":{pantalla:38000,bateria:25000},
    "iphone 8":{pantalla:38000,bateria:25000},"iphone 8 plus":{pantalla:42000,bateria:27000},
    "iphone x":{pantalla:55000,bateria:30000},"iphone xs":{pantalla:60000,bateria:32000},
    "iphone xs max":{pantalla:65000,bateria:35000},"iphone xr":{pantalla:60000,bateria:32000},
    "iphone 11":{pantalla:70000,bateria:40000},"iphone 11 pro":{pantalla:90000,bateria:42000},
    "iphone 11 pro max":{pantalla:95000,bateria:42000},"iphone 12":{pantalla:95000,bateria:45000},
    "iphone 12 mini":{pantalla:95000,bateria:45000},"iphone 12 pro":{pantalla:110000,bateria:45000},
    "iphone 12 pro max":{pantalla:120000,bateria:48000},"iphone 13":{pantalla:85000,bateria:45000},
    "iphone 13 mini":{pantalla:85000,bateria:45000},"iphone 13 pro":{pantalla:120000,bateria:50000},
    "iphone 13 pro max":{pantalla:130000,bateria:50000},"iphone 14":{pantalla:110000,bateria:50000},
    "iphone 14 plus":{pantalla:120000,bateria:52000},"iphone 14 pro":{pantalla:150000,bateria:55000},
    "iphone 14 pro max":{pantalla:160000,bateria:55000},"iphone 15":{pantalla:140000,bateria:55000},
    "iphone 15 plus":{pantalla:150000,bateria:58000},"iphone 15 pro":{pantalla:180000,bateria:60000},
    "iphone 15 pro max":{pantalla:190000,bateria:60000}
};

let activeModel = null;
let activeRepair = null;
const garantia = "Garantía por servicio y falla de fábrica.";

const saved = localStorage.getItem("clinic_pro_data");
if(saved) data = JSON.parse(saved);

// SHORTCUTS (SOLO 11 AL 15)
function initShortcuts() {
    const container = document.getElementById("shortcuts");
    container.innerHTML = "";
    const list = ["iphone 11", "iphone 12", "iphone 13", "iphone 14", "iphone 15"];
    list.forEach(m => {
        const btn = document.createElement("button");
        btn.className = "shortcut-btn";
        btn.textContent = m.replace("iphone ", "").toUpperCase();
        btn.onclick = () => selectModel(m, btn);
        container.appendChild(btn);
    });
}

function initSelect() {
    const sel = document.getElementById("modelSelect");
    sel.innerHTML = '<option value="">Todos los modelos...</option>';
    Object.keys(data).sort().forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m.toUpperCase();
        sel.appendChild(opt);
    });
}

function selectModel(m, btn) {
    activeModel = m;
    document.querySelectorAll(".shortcut-btn").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");
    document.getElementById("modelSelect").value = m;
    render();
}

function toggleRepair(type) {
    if(activeRepair === type) {
        activeRepair = null;
        document.getElementById(`btn-${type}`).classList.remove("active");
    } else {
        activeRepair = type;
        document.querySelectorAll(".repair-card").forEach(c => c.classList.remove("active"));
        document.getElementById(`btn-${type}`).classList.add("active");
    }
    render();
}

function render() {
    const area = document.getElementById("displayArea");
    if(!activeModel || !activeRepair) { area.innerHTML = ""; return; }

    const price = data[activeModel][activeRepair];
    const title = activeRepair === "pantalla" ? "Cambio de Pantalla" : "Cambio de Batería";
    const extra = activeRepair === "bateria" ? "Batería marca Mechanic – Condición 100%" : "Repuesto Calidad Original";

    area.innerHTML = `
        <div class="result-card">
            <div style="font-weight:700;">${activeModel.toUpperCase()}</div>
            <div style="color:var(--text-sub)">${title}</div>
            <div class="price-tag">${formatMoney(price)}</div>
            <div class="copy-box" id="copyMsg">${activeModel.toUpperCase()}\n\n${title}\nPrecio: ${formatMoney(price)}\n${extra}\nTiempo: 30-45 min\n${garantia}</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="copyToClipboard()">Copiar</button>
                <button class="btn btn-secondary" onclick="openWA()">WhatsApp</button>
            </div>
        </div>
    `;
}

function formatMoney(n) { return "$" + Number(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }

// COPIADO SIN ERRORES DE FORMATO
function copyToClipboard() {
    const price = formatMoney(data[activeModel][activeRepair]);
    const title = activeRepair === "pantalla" ? "Cambio de Pantalla" : "Cambio de Batería";
    const extra = activeRepair === "bateria" ? "Batería marca Mechanic – Condición 100%" : "Repuesto Calidad Original";

    // Generamos el texto puro para que no haya errores de espacios al pegar
    const cleanText = `${activeModel.toUpperCase()}\n\n${title}\nPrecio: ${price}\n${extra}\nTiempo de reparación: 30 a 45 minutos\n${garantia}`;

    navigator.clipboard.writeText(cleanText).then(() => alert("Copiado con éxito"));
}

function openWA() {
    const text = document.getElementById("copyMsg").innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function toggleDarkMode() {
    document.getElementById("body").classList.toggle("dark-mode");
}

function loginAdmin() {
    if(prompt("Password:") === "admin123") {
        document.getElementById("adminPanel").classList.remove("hidden");
        renderAdmin();
    }
}

function logoutAdmin() { document.getElementById("adminPanel").classList.add("hidden"); }

function renderAdmin() {
    const body = document.getElementById("adminBody");
    body.innerHTML = "";
    Object.keys(data).forEach(m => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${m}</td>
            <td><input type="number" value="${data[m].pantalla}" onchange="data['${m}'].pantalla=Number(this.value)"></td>
            <td><input type="number" value="${data[m].bateria}" onchange="data['${m}'].bateria=Number(this.value)"></td>`;
        body.appendChild(tr);
    });
}

function addNewModel() {
    const n = prompt("Modelo:");
    if(n) { data[n.toLowerCase()] = {pantalla:0, bateria:0}; renderAdmin(); initSelect(); }
}

function persistData() { localStorage.setItem("clinic_pro_data", JSON.stringify(data)); alert("Guardado."); }

document.getElementById("mainSearch").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase();
    Object.keys(data).forEach(m => { if(val.includes(m.replace("iphone ",""))) activeModel = m; });
    if(val.includes("panta")) activeRepair = "pantalla";
    if(val.includes("bat")) activeRepair = "bateria";
    render();
});

document.getElementById("modelSelect").onchange = (e) => selectModel(e.target.value);
document.getElementById("currentYear").textContent = new Date().getFullYear();

initShortcuts();
initSelect();
</script>
</body>
</html>
